<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#171717" />
  <title>ANGELIM | Parnaíba</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest-v121.json" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  
  <!-- SEO & Social Media (Especialista) -->
  <meta name="description" content="Encontre os GCs da Igreja Angelim em Parnaíba. Mapa interativo com localizações, horários e rotas." />
  <meta name="keywords" content="Angelim, Parnaíba, GCs, Grupos de Crescimento, Igreja, Mapa" />
  <meta property="og:title" content="ANGELIM | Mapa de GCs Parnaíba" />
  <meta property="og:description" content="Localize o Grupo de Crescimento mais próximo de você e conecte-se!" />
  <meta property="og:image" content="https://gcs-angelim.netlify.app/og-image.jpg" />
  <meta property="og:url" content="https://gcs-angelim.netlify.app" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link rel="stylesheet" href="./src/style.css">
</head>

<body class="font-['Outfit'] select-none overflow-hidden relative h-screen w-full lg:bg-gray-100">
  
  <main id="app-root" class="relative h-full w-full overflow-hidden">
    
    <!-- Container de Toasts -->
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[3000] flex flex-col gap-2 w-full max-w-[90vw] pointer-events-none"></div>

    <!-- Modal de Autenticação -->
    <div id="auth-overlay" class="fixed inset-0 bg-brand-dark/40 backdrop-blur-md z-[2000] flex items-center justify-center px-4 transition-all duration-300 hidden">
      <div class="bg-white/95 backdrop-blur shadow-2xl rounded-[2.5rem] p-8 w-full max-w-md border border-white/20 relative overflow-hidden flex flex-col">
        <div class="absolute -top-12 -right-12 w-24 h-24 bg-brand-accent/20 rounded-full blur-2xl"></div>
        
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-brand-dark rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
            <img src="/logo.svg" alt="Logo" class="w-10 h-10 object-contain">
          </div>
          <h2 id="auth-title" class="text-2xl font-black text-gray-900 tracking-tight">Bem-vindo</h2>
          <p id="auth-subtitle" class="text-sm text-gray-500 mt-1">Acesse para gerenciar o Mapa</p>
        </div>

        <form id="auth-form" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1 ml-1">E-mail</label>
            <input type="email" id="auth-email" required placeholder="seu@email.com" 
              class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-dark transition-all">
          </div>
          <div class="relative">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1 ml-1">Senha</label>
            <input type="password" id="auth-password" required placeholder="••••••••" 
              class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-dark transition-all">
          </div>

          <button type="submit" id="auth-submit-btn" class="w-full bg-brand-dark text-white py-4 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
            <span>Entrar</span>
            <svg id="auth-btn-loader" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          </button>
        </form>

        <div class="mt-6 text-center">
          <button id="auth-switch-btn" class="text-xs font-semibold text-brand-dark/60 hover:text-brand-dark">Ainda não tem conta? <span class="text-brand-dark underline underline-offset-4">Cadastre-se</span></button>
        </div>
      </div>
    </div>

    <!-- Mapa Fullscreen Background -->
    <div id="map" class="w-full h-screen"></div>

    <!-- Barra Superior / Busca -->
    <header id="main-header" class="fixed left-4 right-4 md:right-auto md:w-96 z-[1000] flex flex-col gap-2 pointer-events-none transition-all duration-300">
      <div class="bg-white/95 backdrop-blur-md shadow-lg rounded-2xl p-3 grid grid-cols-[1fr_auto] items-center gap-3 border border-gray-200 pointer-events-auto transition-transform duration-300 hover:shadow-xl">
        <div class="flex items-center gap-3 min-w-0 overflow-hidden">
          <div class="w-10 h-10 rounded-full bg-brand-dark flex items-center justify-center overflow-hidden shrink-0 border-2 border-brand-light">
            <img src="/logo.svg" alt="Logo Angelim" class="w-full h-full object-cover object-center" />
          </div>
          <div class="min-w-0 flex-shrink-1">
            <h1 class="text-sm font-bold text-gray-900 tracking-tight leading-tight truncate">ANGELIM</h1>
            <h2 class="text-[10px] font-semibold text-gray-500 tracking-widest uppercase truncate">Parnaíba</h2>
          </div>
        </div>

        <div class="flex items-center gap-1 bg-gray-50/50 rounded-full p-0.5 border border-gray-100">
          <button id="login-trigger" aria-label="Login" class="p-2.5 rounded-full text-gray-400 hover:bg-white hover:text-gray-900 transition-all cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </button>
        </div>
      </div>

      <div class="mt-1 relative pointer-events-auto">
        <input type="text" id="search-input" autocomplete="off" placeholder="Pesquisar Bairro ou GC..." class="w-full bg-white/95 backdrop-blur shadow-md border border-gray-200 rounded-xl pl-4 pr-10 py-3 text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-dark transition-all">
        <svg class="w-5 h-5 text-gray-400 absolute right-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <ul id="search-results" class="hidden absolute top-full mt-2 w-full bg-white shadow-2xl rounded-xl border border-gray-100 max-h-64 overflow-y-auto z-50 custom-scroll text-sm"></ul>
      </div>

      <div id="app-status" class="hidden bg-red-500/90 backdrop-blur-sm text-white px-4 py-2 rounded-xl shadow-md pointer-events-auto text-xs font-semibold" role="alert">
        <span id="app-status-message"></span>
      </div>
    </header>

    <!-- Painel Admin (Responsividade Refinada) -->
    <aside id="admin-panel" class="hidden absolute bottom-0 left-0 right-0 md:bottom-auto md:top-12 md:left-4 w-full md:w-[600px] z-[1000] bg-white/95 backdrop-blur-md shadow-2xl rounded-t-3xl md:rounded-2xl border border-gray-200 flex-col transition-all duration-500 transform translate-y-full md:translate-y-0 max-h-[90vh] md:max-h-[calc(100vh-6rem)] overflow-hidden pointer-events-auto">
      <div class="md:hidden w-full flex justify-center py-3 active:bg-gray-100 rounded-t-3xl cursor-grab">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
      </div>

      <div class="p-4 md:p-6 overflow-y-auto w-full h-full custom-scroll" id="admin-view-container">
        <div class="flex items-center justify-between mb-5">
          <h3 class="text-xl font-black text-gray-900 uppercase tracking-wide" id="admin-title">Painel</h3>
          <button id="admin-logout-btn" onclick="window.signOut()" class="text-[10px] font-bold text-red-500 hover:text-red-600 uppercase">Sair</button>
        </div>

        <div id="admin-content" class="space-y-4 text-sm text-gray-800">
          <p class="animate-pulse">Sincronizando base de dados...</p>
        </div>

        <div id="gc-editor" class="hidden space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-300">
          <div class="flex items-center gap-2 mb-4">
            <button id="close-editor" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
            <span class="font-bold text-sm uppercase tracking-wider text-brand-dark">Editar Grupo</span>
          </div>

          <form id="gc-form" class="space-y-4 pb-12">
            <input type="hidden" id="gc-edit-id">
            <div class="relative group">
              <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Foto do Grupo</label>
              <div id="photo-dropzone" class="w-full h-40 bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:border-brand-dark transition-all overflow-hidden relative">
                <input type="file" id="gc-photo-input" class="hidden" accept="image/*">
                <div id="photo-placeholder" class="text-center p-4">
                  <svg class="w-8 h-8 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                  <span class="text-[10px] text-gray-400 font-bold uppercase">Clique para escolher foto</span>
                </div>
                <img id="photo-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                <div id="upload-status" class="hidden absolute inset-0 bg-brand-dark/60 flex items-center justify-center text-white text-[10px] font-bold uppercase">Enviando...</div>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div class="md:col-span-2">
                <input type="text" id="gc-name" placeholder="Nome do GC" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              </div>
              <input type="text" id="gc-bairro" placeholder="Bairro" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              <input type="text" id="gc-leader" placeholder="Líder" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              
              <input type="text" id="gc-dia" placeholder="Dia (ex: Terça)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              <input type="text" id="gc-horario" placeholder="Horário (ex: 19:30)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              
              <div class="md:col-span-2">
                <input type="text" id="gc-contato" placeholder="Contato (apenas números)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              </div>
              
              <div class="md:col-span-2">
                <input type="text" id="gc-address" placeholder="Endereço Completo" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              </div>

              <input type="text" id="gc-lat" placeholder="Latitude (ex: -2.90)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
              <input type="text" id="gc-lng" placeholder="Longitude (ex: -41.76)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-dark outline-none">
            </div>

            <button type="submit" id="save-gc-btn" class="w-full bg-brand-dark text-white py-4 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition-all">Salvar Alterações</button>
          </form>
        </div>
      </div>
    </aside>

    <!-- Gaveta Pública -->
    <aside id="public-sheet" class="absolute bottom-0 left-0 right-0 md:bottom-4 md:left-4 md:right-auto md:w-[360px] z-[900] bg-white/95 backdrop-blur-xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.3)] md:shadow-2xl rounded-t-3xl md:rounded-3xl border border-gray-200 flex flex-col transition-transform duration-500 transform translate-y-[calc(100%-55px)] md:translate-y-0 h-[65vh] md:h-auto md:max-h-[75vh] pointer-events-auto">
      <div id="sheet-handle" class="w-full flex justify-center py-5 cursor-pointer hover:bg-gray-50 rounded-t-3xl border-b border-gray-100 flex-shrink-0 active:bg-gray-100 transition-colors">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        <h3 class="absolute uppercase tracking-widest text-[10px] font-bold text-gray-400 mt-1">Explorar Grupos</h3>
      </div>
      
      <div id="public-gc-list" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3 pb-8">
         <p class="text-center text-sm text-gray-400 mt-10 animate-pulse">Mapeando locais próximos...</p>
      </div>
    </aside>

  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
