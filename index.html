<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#171717" />
  <title>Gc's Angelim v1.2.1-FIXED</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest-v121.json" />
  
  <!-- Favicon / Aba -->
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Netlify Identity Widget -->
  <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-gray-100 text-gray-900 font-sans h-screen w-full overflow-hidden relative">

  <!-- Mapa Fullscreen Background -->
  <div id="map-container" class="absolute inset-0 z-0 w-full h-full">
    <div id="map" class="w-full h-full"></div>
  </div>

  <!-- Interface Flutuante: Tipo Google Maps -->

  <!-- Barra Superior / Busca (Desktop: Top-Left / Mobile: Top-Center) -->
  <header class="absolute top-4 left-4 right-4 md:right-auto md:w-96 z-[1000] flex flex-col gap-2 pointer-events-none">

    <!-- Caixa Principal (Logo + Auth) -->
    <div
      class="bg-white/95 backdrop-blur-md shadow-lg rounded-2xl p-3 flex items-center justify-between border border-gray-200 pointer-events-auto transition-transform duration-300 hover:shadow-xl">
      <div class="flex items-center gap-3">
        <!-- Logo - Altere logo.png para a extensao correta caso seja jpg ou svg -->
        <div
          class="w-10 h-10 rounded-full bg-brand-dark flex items-center justify-center overflow-hidden shrink-0 border-2 border-brand-light">
          <img src="/logo.svg" alt="Logo Angelim" class="w-full h-full object-cover object-center fallback-logo"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          <!-- Fallback Icon caso a logo falhe ao carregar -->
          <svg class="w-6 h-6 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8">
            </path>
          </svg>
        </div>
        <div>
          <h1 class="text-sm font-bold text-gray-900 tracking-tight leading-tight">ANGELIM</h1>
          <h2 class="text-xs font-semibold text-gray-500 tracking-widest uppercase">Parnaíba</h2>
        </div>
      </div>

      <!-- Netlify Identity Wrapper Ocultando a UI suja e deixando limpo -->
      <!-- Botão Discreto de Login Admin (Cadeado Translúcido no Canto Superior Direito) -->
  <button id="auth-lock-btn" aria-label="Login de Administrador" class="fixed top-5 right-5 opacity-30 hover:opacity-100 transition-opacity z-[800] p-2.5 rounded-full bg-white backdrop-blur-md shadow-sm border border-gray-200 text-gray-500 active:scale-95 cursor-pointer">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
  </button>
    </div>

    <!-- Barra de Pesquisa Interna -->
    <div class="mt-1 relative pointer-events-auto">
      <input type="text" id="search-input" autocomplete="off" placeholder="Qual bairro ou nome do GC?" class="w-full bg-white/95 backdrop-blur shadow-md border border-gray-200 rounded-xl pl-4 pr-10 py-3 text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-dark transition-all">
      <svg class="w-5 h-5 text-gray-400 absolute right-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      
      <!-- Dropdown de Resultados -->
      <ul id="search-results" class="hidden absolute top-full mt-2 w-full bg-white shadow-2xl rounded-xl border border-gray-100 max-h-64 overflow-y-auto z-50 custom-scroll text-sm"></ul>
    </div>

    <!-- App Status / Erro - Oculto por padrão -->
    <div id="app-status"
      class="hidden bg-red-500/90 backdrop-blur-sm text-white px-4 py-2 rounded-xl shadow-md pointer-events-auto text-xs font-semibold"
      role="alert">
      <span id="app-status-message"></span>
    </div>

  </header>

  <!-- Side/Bottom Panel para Admin e Editor - Flutuante -->
  <aside id="admin-panel"
    class="hidden absolute bottom-0 left-0 right-0 md:bottom-auto md:top-24 md:left-4 md:w-96 z-[1000] bg-white/95 backdrop-blur-md shadow-2xl rounded-t-3xl md:rounded-2xl border border-gray-200 flex-col transition-all duration-500 transform translate-y-full md:translate-y-0 max-h-[60vh] md:max-h-[calc(100vh-8rem)] overflow-hidden pointer-events-auto">

    <!-- 'Handle' Mobile para puxar o painel -->
    <div class="md:hidden w-full flex justify-center py-3 active:bg-gray-100 rounded-t-3xl cursor-grab">
      <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
    </div>

    <div class="p-5 md:pt-6 overflow-y-auto w-full h-full custom-scroll">
      <h3 class="text-lg font-black text-gray-900 mb-2 uppercase tracking-wide" id="admin-title">Painel</h3>
      <div id="admin-content" class="space-y-4 text-sm text-gray-800">
        <p class="animate-pulse">Sincronizando base de dados...</p>
      </div>
    </div>
  </aside>

  <!-- Gaveta Pública: Explorar GCs (Bottom Sheet Público) -->
  <aside id="public-sheet" class="absolute bottom-0 left-0 right-0 md:bottom-4 md:left-4 md:right-auto md:w-[360px] z-[900] bg-white/95 backdrop-blur-xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.3)] md:shadow-2xl rounded-t-3xl md:rounded-3xl border border-gray-200 flex flex-col transition-transform duration-500 transform translate-y-[calc(100%-55px)] md:translate-y-0 h-[65vh] md:h-auto md:max-h-[75vh] pointer-events-auto">
    <!-- Drag Handle -->
    <div id="sheet-handle" class="w-full flex justify-center py-5 cursor-pointer hover:bg-gray-50 rounded-t-3xl border-b border-gray-100 flex-shrink-0 active:bg-gray-100 transition-colors">
      <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
      <h3 class="absolute uppercase tracking-widest text-[10px] font-bold text-gray-400 mt-1">Explorar Grupos</h3>
    </div>
    
    <!-- Lista Pública de GCs -->
    <div id="public-gc-list" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3 pb-8">
       <p class="text-center text-sm text-gray-400 mt-10 animate-pulse">Mapeando locais próximos...</p>
    </div>
  </aside>

  <style>
    /* Custom Scrollbar for Inner Lists */
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 5px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  </style>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
